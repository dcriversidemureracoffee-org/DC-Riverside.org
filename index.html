<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riverside Connect – Welcome</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="manifest" href="./manifest.json">

  <!-- iOS support -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Riverside Connect">

  <link rel="apple-touch-icon" sizes="180x180" href="maskable_icon_x192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Riverside Connect">
  <meta property="og:description" content="Join the conversation – real-time Christian community">
  <meta property="og:image" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/maskable_icon_x192.png">
  <meta property="og:url" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: -webkit-fill-available;
    }

    header {
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      border-bottom: 1px solid rgba(96, 165, 250, 0.18);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-content {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.5rem;
      color: #60a5fa;
      font-weight: 600;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      overflow-y: auto;
      overflow-x: hidden;
      gap: 32px;
    }

    .welcome {
      text-align: center;
      max-width: 480px;
    }

    .welcome h2 {
      font-size: 1.9rem;
      margin-bottom: 12px;
      color: #60a5fa;
    }

    .welcome p {
      font-size: 1.05rem;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      width: 100%;
      max-width: 420px;
      padding: 0 12px;
    }

    .big-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px 24px;
      font-size: 1.15rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      border: none;
      border-radius: 16px;
      text-decoration: none;
      transition: all 0.22s ease;
      box-shadow: 0 6px 20px rgba(59,130,246,0.35);
      cursor: pointer;
    }

    .big-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(59,130,246,0.5);
    }

    .section-title {
      color: #94a3b8;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 16px 8px;
      align-self: flex-start;
      width: 100%;
      max-width: 480px;
    }

   .circle-scroll-container {
  width: 100%;
  max-width: 480px;                    /* or whatever max width you want */
  overflow-x: auto;                    /* ← enables horizontal scroll */
  overflow-y: hidden;                  /* ← prevents vertical scroll */
  -webkit-overflow-scrolling: touch;   /* smooth momentum on iOS */
  scrollbar-width: thin;               /* Firefox */
  scrollbar-color: #60a5fa #1e293b;
  padding: 0 0 16px 0;                 /* bottom padding for scrollbar */
  margin: 0 auto;
  scroll-snap-type: x proximity;       /* nice snap to items */
}

.circle-scroll-container::-webkit-scrollbar {
  height: 6px;
}

.circle-scroll-container::-webkit-scrollbar-track {
  background: transparent;
}

.circle-scroll-container::-webkit-scrollbar-thumb {
  background: rgba(96, 165, 250, 0.5);
  border-radius: 3px;
}

.circle-scroll-container::-webkit-scrollbar-thumb:hover {
  background: #60a5fa;
}

/* Keep this — makes items stay in one row */
.circle-grid {
  display: inline-flex;
  flex-direction: row;
  flex-wrap: nowrap;          /* ← critical: no wrapping */
  gap: 28px;
  padding: 0 16px;
  min-width: 100%;            /* ensures it can be wider than container */
}
    .circle-item {
      flex: 0 0 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      cursor: pointer;
      transition: transform 0.18s ease;
      text-decoration: none;
      color: inherit;
    }

    .circle-item:hover {
      transform: scale(1.08);
    }

    .circle-avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      background: #1e293b;
      border: 3px solid rgba(96,165,250,0.45);
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.1rem;
      color: white;
      font-weight: bold;
    }

    .circle-label {
      margin-top: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-section {
      text-align: center;
      color: #94a3b8;
      padding: 60px 20px;
      font-size: 1.05rem;
    }

    .install-area {
      padding: 20px 24px;
      background: rgba(15,23,42,0.6);
      border-top: 1px solid rgba(96,165,250,0.15);
      text-align: center;
    }

    #installAppBtn {
      padding: 14px 28px;
      font-size: 1.05rem;
      background: rgba(96,165,250,0.15);
      color: #60a5fa;
      border: 1px solid rgba(96,165,250,0.4);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #installAppBtn:hover {
      background: rgba(96,165,250,0.25);
    }

    #installAppBtn.hidden {
      display: none;
    }

    .status-pending {
      color: #f59e0b;
      font-weight: 600;
    }

    @media (max-width: 500px) {
      .welcome h2 { font-size: 1.7rem; }
      .circle-avatar { width: 68px; height: 68px; font-size: 1.9rem; }
      .circle-label { font-size: 0.9rem; }
    }

    @supports (padding-top: env(safe-area-inset-top)) {
      header { padding-top: calc(16px + env(safe-area-inset-top)); }
      .install-area { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>Riverside Connect</h1>
    <div>
      <img id="user-avatar" class="avatar" src="" alt="Profile"
           style="width:44px;height:44px;border-radius:50%;border:2px solid #60a5fa;object-fit:cover;"
           onerror="this.src='https://via.placeholder.com/44?text=@'">
    </div>
  </div>
</header>

<main>

  <div class="welcome" id="welcome-message">
    <h2>Welcome!</h2>
    <p>Loading your status...</p>
  </div>

  <div class="button-grid" id="button-container">
    <!-- Buttons will be injected here by JS -->
  </div>

</main>

<div class="install-area">
  <button id="installAppBtn">
    <i class="fas fa-download"></i> Install App
  </button>
</div>

<!-- Minimal Install Modal / Toast support -->
<div id="installModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center;">
  <div style="background:rgba(30,41,59,0.95); padding:28px; border-radius:16px; max-width:340px; text-align:center; border:1px solid rgba(96,165,250,0.25);">
    <h3 style="color:#60a5fa; margin-bottom:16px;">Add to Home Screen?</h3>
    <p style="color:#cbd5e1; margin-bottom:24px; line-height:1.45;">Install Riverside Connect for quicker access and better experience.</p>
    <div style="display:flex; gap:12px;">
      <button id="installYes" style="flex:1; padding:14px; background:#3b82f6; color:white; border:none; border-radius:12px; font-weight:600;">Yes</button>
      <button id="installNo"  style="flex:1; padding:14px; background:transparent; color:white; border:1px solid #60a5fa; border-radius:12px;">Later</button>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
//  BASIC SETUP
// ────────────────────────────────────────────────
const scriptUrl = 'https://script.google.com/macros/s/AKfycbyWOzXGyr_N9_GJ2wntUq3IcdMjcsBsSHKiJ-bw0zQjhrbLB7lRi7J3eUXA0ZT7Uxhg/exec';
const userName   = localStorage.getItem('userName');

if (!userName) {
  window.location.href = 'login.html';
}

// Avatar
const avatar = document.getElementById('user-avatar');
const picLink = localStorage.getItem('userPicLink');
if (picLink) {
  const id = picLink.match(/[-\w]{25,}/)?.[0];
  avatar.src = id ? `https://lh3.googleusercontent.com/d/${id}` : picLink;
} else {
  avatar.src = 'https://via.placeholder.com/44?text=@';
}

// ────────────────────────────────────────────────
//  INSTALL BUTTON LOGIC
// ────────────────────────────────────────────────
let deferredPrompt;
const installBtn   = document.getElementById('installAppBtn');
const installModal = document.getElementById('installModal');

if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true) {
  installBtn.classList.add('hidden');
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.remove('hidden');
});

installBtn.addEventListener('click', () => {
  installModal.style.display = 'flex';
});

document.getElementById('installYes').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBtn.classList.add('hidden');
    deferredPrompt = null;
  }
  installModal.style.display = 'none';
});

document.getElementById('installNo').addEventListener('click', () => {
  installModal.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  installBtn.classList.add('hidden');
  installModal.style.display = 'none';
});

// ────────────────────────────────────────────────
//  DASHBOARD – NO BADGES, CLEAN CIRCLES
// ────────────────────────────────────────────────
async function loadDashboard() {
  try {
    console.log("Loading dashboard for:", userName);

    const res = await fetch(`${scriptUrl}?operation=getUserStatus&name=${encodeURIComponent(userName)}`);
    const data = await res.json();

    if (data.status !== 'success') throw new Error("User status failed");

    const isApproved = data.userStatus?.toLowerCase() === 'approved';
    const welcomeEl = document.getElementById('welcome-message');
    const btnContainer = document.getElementById('button-container');

    if (isApproved) {
      welcomeEl.innerHTML = `
        <h2>Hello, ${userName}!</h2>
        <p>Choose where you'd like to go</p>
      `;

      btnContainer.innerHTML = `
  <div style="width:100%; max-width:420px; margin:0 auto 32px auto;">
    <div class="button-grid">
      <a href="home.html" class="big-btn"><i class="fas fa-home"></i> Home</a>
      <a href="announce.html" class="big-btn"><i class="fas fa-bullhorn"></i> Announcements</a>
    </div>
  </div>

  <h3 class="section-title">Q&A Space</h3>
  <div class="circle-scroll-container">
    <div id="qna-spaces-grid" class="circle-grid"></div>
  </div>

  <h3 class="section-title" style="margin-top:40px;">Channels</h3>
  <div class="circle-scroll-container">
    <div id="channels-grid" class="circle-grid"></div>
  </div>
`;

      // Fetch Q&A channels
      const qnaRes = await fetch(`${scriptUrl}?operation=getAllQnAChannels`);
      const qnaData = await qnaRes.json();
      const qnaChannels = qnaData.channels || [];

      const qnaGrid = document.getElementById('qna-spaces-grid');
      qnaGrid.innerHTML = qnaChannels.length === 0
        ? `<div class="empty-section"><i class="far fa-question-circle" style="font-size:3.2rem; opacity:0.5;"></i><br><br>No Q&A spaces yet</div>`
        : qnaChannels.map(ch => {
            const initial = ch.name.charAt(0).toUpperCase();
            const avatarSrc = ch.picLink ? getLh3Link(ch.picLink) : '';
            const bgColor = avatarSrc ? '' : `background:#${Math.floor(Math.random()*16777215).toString(16)};`;

            return `
              <a href="Q&A.html?channelId=${encodeURIComponent(ch.id)}" class="circle-item">
                <div style="position:relative;">
                  ${avatarSrc 
                    ? `<img src="${avatarSrc}" class="circle-avatar" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
                    : `<div class="circle-avatar" style="${bgColor}">${initial}</div>`
                  }
                  <div class="circle-avatar" style="display:${avatarSrc ? 'none' : 'flex'};${bgColor}">${initial}</div>
                </div>
                <div class="circle-label">${ch.name}</div>
              </a>
            `;
          }).join('');

      // Fetch regular channels
      const chRes = await fetch(`${scriptUrl}?operation=getAllChannels`);
      const chData = await chRes.json();
      const channels = chData.channels || [];

      const chGrid = document.getElementById('channels-grid');
      chGrid.innerHTML = channels.length === 0
        ? `<div class="empty-section"><i class="far fa-layer-group" style="font-size:3.2rem; opacity:0.5;"></i><br><br>No channels yet</div>`
        : channels.map(ch => {
            const initial = ch.name.charAt(0).toUpperCase();
            const avatarSrc = ch.picLink ? getLh3Link(ch.picLink) : '';
            const bgColor = avatarSrc ? '' : `background:#${Math.floor(Math.random()*16777215).toString(16)};`;

            return `
              <a href="channel.html?channelId=${encodeURIComponent(ch.id)}" class="circle-item">
                <div style="position:relative;">
                  ${avatarSrc 
                    ? `<img src="${avatarSrc}" class="circle-avatar" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
                    : `<div class="circle-avatar" style="${bgColor}">${initial}</div>`
                  }
                  <div class="circle-avatar" style="display:${avatarSrc ? 'none' : 'flex'};${bgColor}">${initial}</div>
                </div>
                <div class="circle-label">${ch.name}</div>
              </a>
            `;
          }).join('');

    } else {
      const statusText = data.userStatus?.toLowerCase() === 'pending' ? 'pending approval' : 'not active';

      welcomeEl.innerHTML = `
        <h2>Welcome, ${userName}</h2>
        <p>Your account is currently <span class="status-pending">${statusText}</span></p>
      `;

      btnContainer.innerHTML = `
        <div class="button-grid">
          <a href="Q&A.html" class="big-btn"><i class="fas fa-question-circle"></i> Q & A</a>
          <a href="channel.html" class="big-btn"><i class="fas fa-users"></i> Channels</a>
        </div>
      `;
    }

  } catch (err) {
    console.error("Dashboard load failed:", err);
    document.getElementById('welcome-message').innerHTML = `
      <h2 style="color:#f87171;">Connection issue</h2>
      <p>Please check your internet and try again.</p>
    `;
  }
}



function getLh3Link(url) {
  if (!url) return '';
  const id = url.match(/[-\w]{25,}/)?.[0];
  return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
}

// Load immediately
loadDashboard();
</script>

</body>
</html>
